<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masjid Ashqaf Donasi</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#059669">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ashqaf: {
                            light: '#d1fae5',
                            DEFAULT: '#059669', // Emerald 600
                            dark: '#065f46',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-10">

    <!-- Header -->
    <header class="bg-ashqaf text-white rounded-b-[2rem] shadow-lg mb-8 pt-8 pb-10 px-6 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Ashqaf Tracker</h1>
                <p class="text-ashqaf-light text-sm mt-1 opacity-90">Sistem Input Donasi Masjid</p>
            </div>
            <div class="bg-white/20 p-3 rounded-full backdrop-blur-sm">
                <i data-lucide="mosque" class="w-8 h-8 text-white"></i>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-md mx-auto px-4">
        
        <!-- Form Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <h2 class="text-lg font-semibold text-slate-700 mb-6 flex items-center">
                <i data-lucide="clipboard-edit" class="w-5 h-5 mr-2 text-ashqaf"></i> Form Input Donasi
            </h2>
            
            <form id="donationForm" class="space-y-5">
                
                <!-- Divisi -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Divisi Fundraising</label>
                    <select id="divisi" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors">
                        <option value="" disabled selected>Pilih Divisi...</option>
                        <option value="Online / Media Sosial">Divisi Online / Media Sosial</option>
                        <option value="Event / Kajian">Divisi Event / Kajian</option>
                        <option value="Jemput Donasi">Divisi Jemput Donasi</option>
                        <option value="Kotak Amal / QRIS Mandiri">Divisi Kotak Amal / QRIS Mandiri</option>
                    </select>
                </div>

                <!-- Petugas -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nama Petugas / Fundraiser</label>
                    <div class="relative">
                        <i data-lucide="user-badge" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="petugas" required class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors" placeholder="Nama Anda">
                    </div>
                </div>

                <!-- Donatur -->
                <div class="pt-2 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-600">Nama Donatur</label>
                        <label class="flex items-center space-x-2 text-sm text-ashqaf cursor-pointer">
                            <input type="checkbox" id="anonimCheck" class="rounded text-ashqaf focus:ring-ashqaf w-4 h-4">
                            <span>Hamba Allah</span>
                        </label>
                    </div>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="text" id="donatur" required class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors" placeholder="Nama Donatur">
                    </div>
                </div>

                <!-- Kontak -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nomor Kontak (WhatsApp)</label>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="tel" id="kontak" class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors" placeholder="08123456789 (Opsional)">
                    </div>
                </div>

                <!-- Nominal -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nominal Donasi</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 font-semibold text-slate-500">Rp</span>
                        <input type="text" id="nominalDisplay" required class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-lg font-bold text-ashqaf focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors" placeholder="0">
                        <!-- Input hidden to store raw number -->
                        <input type="hidden" id="nominalRaw">
                    </div>
                </div>

                <!-- Metode Pembayaran -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Metode Pembayaran</label>
                    <select id="metode" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors">
                        <option value="Transfer Bank">Transfer Bank</option>
                        <option value="QRIS">QRIS</option>
                        <option value="Tunai / Cash">Tunai / Cash</option>
                    </select>
                </div>

                <!-- Alokasi -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Alokasi Donasi</label>
                    <select id="alokasi" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ashqaf/50 focus:border-ashqaf transition-colors">
                        <option value="Operasional Masjid">Operasional Masjid</option>
                        <option value="Pembangunan / Renovasi">Pembangunan / Renovasi</option>
                        <option value="Santunan Anak Yatim">Santunan Anak Yatim</option>
                        <option value="Sosial & Kemanusiaan">Sosial & Kemanusiaan</option>
                    </select>
                </div>

                <!-- Bukti Pembayaran -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Bukti Transfer / Nota (Opsional)</label>
                    <div class="relative border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 p-4 text-center hover:bg-slate-100 transition-colors">
                        <input type="file" id="bukti" accept="image/*,application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="flex flex-col items-center pointer-events-none">
                            <i data-lucide="upload-cloud" class="w-8 h-8 text-ashqaf mb-2"></i>
                            <span id="fileNameDisplay" class="text-sm text-slate-500 font-medium">Klik untuk upload foto/PDF</span>
                            <span class="text-xs text-slate-400 mt-1">Maks. ukuran direkomendasikan 2MB</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="btnSubmit" class="w-full mt-6 bg-ashqaf hover:bg-ashqaf-dark text-white font-semibold py-4 rounded-xl shadow-lg shadow-ashqaf/30 transition-all flex items-center justify-center">
                    <i data-lucide="send" class="w-5 h-5 mr-2"></i> Simpan Donasi
                </button>
            </form>
        </div>

        <!-- Recent Transactions -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center justify-between">
                <div class="flex items-center">
                    <i data-lucide="history" class="w-5 h-5 mr-2 text-ashqaf"></i> Riwayat Hari Ini
                </div>
                <button id="btnRefresh" class="text-slate-400 hover:text-ashqaf transition-colors p-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </h2>
            
            <div id="recentList" class="space-y-3">
                <!-- Data akan di-inject ke sini via JS -->
                <div class="text-center py-6 text-slate-400 text-sm animate-pulse">
                    Memuat data riwayat...
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay Loading & Modal -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
            <i data-lucide="loader-2" class="w-10 h-10 text-ashqaf animate-spin mb-4"></i>
            <p class="text-slate-700 font-medium">Menyimpan data ke server...</p>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        // Init Icons
        lucide.createIcons();

        // --- KONFIGURASI WEB APP URL GOOGLE APPS SCRIPT ---
        // URL Web App yang sudah Anda deploy
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzGYbCwJO2h5uWedNaOa5e6eA4iUGSmnD1quuvdHyCwIDsXHdcY5uLN-95zw9MjoC4/exec";

        // DOM Elements
        const form = document.getElementById('donationForm');
        const anonimCheck = document.getElementById('anonimCheck');
        const donaturInput = document.getElementById('donatur');
        const nominalDisplay = document.getElementById('nominalDisplay');
        const nominalRaw = document.getElementById('nominalRaw');
        const fileInput = document.getElementById('bukti');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const recentList = document.getElementById('recentList');
        const btnRefresh = document.getElementById('btnRefresh');

        // File State
        let base64String = "";
        let uploadedFileName = "";
        let uploadedMimeType = "";

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered: ', registration);
                }).catch(registrationError => {
                    console.log('SW registration failed: ', registrationError);
                });
            });
        }

        // Logic Checkbox Hamba Allah
        anonimCheck.addEventListener('change', (e) => {
            if (e.target.checked) {
                donaturInput.value = "Hamba Allah";
                donaturInput.readOnly = true;
                donaturInput.classList.add('bg-slate-100', 'text-slate-500');
            } else {
                donaturInput.value = "";
                donaturInput.readOnly = false;
                donaturInput.classList.remove('bg-slate-100', 'text-slate-500');
                donaturInput.focus();
            }
        });

        // Logic Masking Rupiah
        nominalDisplay.addEventListener('input', function(e) {
            // Hapus semua karakter selain angka
            let value = this.value.replace(/[^0-9]/g, '');
            if (value === '') {
                nominalRaw.value = '';
                this.value = '';
                return;
            }
            
            // Simpan raw integer
            nominalRaw.value = value;
            
            // Format tampilan ke Rupiah
            this.value = new Intl.NumberFormat('id-ID').format(value);
        });

        // Logic File Upload to Base64
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // Batasi ukuran (Opsional, di sini contoh max 5MB)
                if(file.size > 5 * 1024 * 1024) {
                    alert('Ukuran file terlalu besar! Maksimal 5MB.');
                    fileInput.value = "";
                    fileNameDisplay.textContent = "Klik untuk upload foto/PDF";
                    return;
                }

                fileNameDisplay.textContent = file.name;
                uploadedFileName = file.name;
                uploadedMimeType = file.type;

                const reader = new FileReader();
                reader.onload = function(event) {
                    // Ambil string base64 setelah "data:image/jpeg;base64,"
                    base64String = event.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            } else {
                fileNameDisplay.textContent = "Klik untuk upload foto/PDF";
                base64String = "";
                uploadedFileName = "";
                uploadedMimeType = "";
            }
        });

        // Submit Form
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL === "GANTI_DENGAN_URL_WEB_APP_ANDA") {
                alert("Harap konfigurasi GAS_WEB_APP_URL terlebih dahulu di dalam script index.html");
                return;
            }

            loadingOverlay.classList.remove('hidden');

            const payload = {
                divisi: document.getElementById('divisi').value,
                petugas: document.getElementById('petugas').value,
                donatur: document.getElementById('donatur').value,
                kontak: document.getElementById('kontak').value || "-",
                nominal: parseInt(nominalRaw.value),
                metode: document.getElementById('metode').value,
                alokasi: document.getElementById('alokasi').value,
                base64: base64String,
                filename: uploadedFileName,
                mimeType: uploadedMimeType
            };

            try {
                // Gunakan POST fetch ke Apps Script Web App
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk bypass blokade CORS dari frontend statis ke GAS
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Karena mode 'no-cors', response menjadi opaque (tidak bisa dibaca statusnya secara langsung).
                // Kita asumsikan berhasil jika tidak terjadi catch error.
                alert("Alhamdulillah, data donasi berhasil disimpan!");
                
                // Reset Form (kecuali divisi dan petugas agar user tidak capek ketik ulang)
                const savedPetugas = document.getElementById('petugas').value;
                const savedDivisi = document.getElementById('divisi').value;
                
                form.reset();
                document.getElementById('petugas').value = savedPetugas;
                document.getElementById('divisi').value = savedDivisi;
                
                anonimCheck.checked = false;
                donaturInput.readOnly = false;
                donaturInput.classList.remove('bg-slate-100', 'text-slate-500');
                
                fileNameDisplay.textContent = "Klik untuk upload foto/PDF";
                base64String = "";
                
                // Refresh data riwayat
                fetchRecentTransactions();

            } catch (error) {
                alert("Maaf, terjadi kesalahan jaringan: " + error.message);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });

        // Load Riwayat Transaksi (GET Request)
        async function fetchRecentTransactions() {
            if(!GAS_WEB_APP_URL || GAS_WEB_APP_URL === "GANTI_DENGAN_URL_WEB_APP_ANDA") return;
            
            btnRefresh.classList.add('animate-spin');
            
            try {
                const response = await fetch(GAS_WEB_APP_URL);
                const data = await response.json();
                
                recentList.innerHTML = '';
                
                if(data.length === 0) {
                    recentList.innerHTML = `<div class="text-center py-4 text-slate-400 text-sm">Belum ada donasi hari ini.</div>`;
                } else {
                    data.forEach(item => {
                        // Pastikan header di Spreadsheet sesuai untuk pemanggilan ini
                        // Contoh mapping array ke object di Backend menghasilkan key berdasarkan Header kolom pertama
                        // Kita asumsikan Header bernama: "Nama Donatur", "Nominal", "Metode", "Timestamp"
                        const donatur = item["Nama Donatur"] || "Anonim";
                        const nominal = item["Nominal"] || 0;
                        const metode = item["Metode"] || "-";
                        
                        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(nominal);
                        
                        const card = `
                        <div class="p-3 border border-slate-100 rounded-xl bg-slate-50 flex justify-between items-center">
                            <div>
                                <p class="text-sm font-bold text-slate-700">${donatur}</p>
                                <p class="text-xs text-slate-500">${metode}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold text-ashqaf">${formatRupiah}</p>
                            </div>
                        </div>`;
                        recentList.insertAdjacentHTML('beforeend', card);
                    });
                }
            } catch (error) {
                recentList.innerHTML = `<div class="text-center py-4 text-red-400 text-sm">Gagal memuat riwayat.</div>`;
                console.error(error);
            } finally {
                btnRefresh.classList.remove('animate-spin');
            }
        }

        btnRefresh.addEventListener('click', fetchRecentTransactions);
        
        // Auto-load saat aplikasi dibuka
        fetchRecentTransactions();

    </script>
</body>
</html>
